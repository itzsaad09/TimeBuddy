on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master, develop]

name: "Build & Release"

jobs:
  build:
    name: Build & Release
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          architecture: x64

      - name: Get Dependencies
        run: flutter pub get

      # --- BUILD COMMANDS (Unsigned) ---
      - name: Build Android APK
        run: |
          flutter build apk --release --build-name=1.0.${{ github.run_number }} --build-number=${{ github.run_number }}
          cd build/app/outputs/flutter-apk/
          mv app-release.apk timebuddy-v1.0.${{ github.run_number }}.apk

      - name: Build and Rename iOS IPA
        run: |
          flutter build ios --release --no-codesign --build-name=1.0.${{ github.run_number }} --build-number=${{ github.run_number }}
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -r timebuddy-v1.0.${{ github.run_number }}.ipa Payload

      # --- RELEASE ---
      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "build/app/outputs/flutter-apk/timebuddy-*.apk,build/ios/iphoneos/timebuddy-*.ipa"
          tag: v1.0.${{ github.run_number }}
          token: ${{ secrets.TOKEN }}
